<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Arcade - English Games</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        header p {
            font-size: 1.1rem;
            color: #e0e0e0;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 380px;
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #2ecc71;
            background: rgba(255, 255, 255, 0.15);
        }
        .game-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .game-card h2 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: #f1c40f;
        }
        .game-card p {
            font-size: 0.95rem;
            color: #ecf0f1;
            margin-bottom: 20px;
            line-height: 1.4;
            flex-grow: 1;
        }
        .play-btn {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            text-decoration: none;
        }
        .play-btn:hover {
            background-color: #27ae60;
        }
        
        /* Botão Sair Global */
        .btn-back {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-back:hover { background: #c0392b; }

        /* Telas Container dos Jogos */
        .game-screen {
            display: none;
            width: 100%;
            max-width: 800px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Placeholder de telas em desenvolvimento */
        .dev-placeholder {
            background: rgba(0,0,0,0.4);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 2px dashed #f1c40f;
        }

        /* ==================== ESTILOS: HANGMAN CHALLENGE ==================== */
        .game-title {
            text-align: center;
            color: #f1c40f;
            margin-bottom: 20px;
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .main-container {
            background: #2c3e50;
            max-width: 600px;
            width: 100%;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .hint-box {
            font-size: 18px;
            color: #bdc3c7;
            text-align: center;
            font-weight: 600;
        }
        .lives-box {
            font-size: 18px;
            background: #c0392b;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .word-display {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 10px 0;
            font-size: 2rem;
            font-weight: bold;
            min-height: 45px;
            width: 100%;
        }
        .letter-slot {
            border-bottom: 4px solid #fff;
            width: 30px;
            text-align: center;
            text-transform: uppercase;
        }
        #feedback-toast {
            height: 30px;
            font-size: 20px;
            font-weight: bold;
            color: #2ecc71;
            text-shadow: 0 0 8px rgba(46,204,113,0.6);
            transition: all 0.2s ease;
            opacity: 0;
            transform: scale(0.8);
        }
        #feedback-toast.show {
            opacity: 1;
            transform: scale(1.2);
        }
        .keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            width: 100%;
            margin-top: 10px;
        }
        @media (max-width: 450px) {
            .keyboard { grid-template-columns: repeat(6, 1fr); }
        }
        .key {
            background: #34495e;
            border: 2px solid #7f8c8d;
            color: white;
            border-radius: 6px;
            padding: 12px 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 50px;
        }
        .key:hover:not(:disabled) {
            background: #7f8c8d;
            border-color: #f1c40f;
        }
        .key.correct {
            background-color: #27ae60 !important;
            border-color: #2ecc71 !important;
            color: #fff;
        }
        .key.wrong {
            background-color: #7f8c8d !important;
            border-color: #95a5a6 !important;
            color: #bdc3c7;
            opacity: 0.6;
        }
        .key-status {
            font-size: 11px;
            margin-top: 2px;
            font-weight: 800;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 110;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .overlay h2 { font-size: 32px; margin-bottom: 15px; }
        .overlay p { font-size: 18px; margin-bottom: 25px; color: #bdc3c7; }
        .reset-btn {
            background: #f1c40f;
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .reset-btn:hover { transform: scale(1.05); }

        footer {
            margin-top: auto;
